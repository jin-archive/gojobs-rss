name: Generate RSS Feed

on:
  schedule:
    # 매일 자정 (KST 기준 오전 9시)에 실행
    - cron: '0 0 * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 체크아웃 (Checkout repository)
      uses: actions/checkout@v3

    - name: 파이썬 환경 설정 (Set up Python)
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 라이브러리 설치 (Install dependencies)
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: RSS 생성 스크립트 실행 (Run script)
      run: python main.py

    - name: 변경사항 커밋 및 푸시 (Commit and push changes)
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add rss.xml
        
        # 변경된 사항이 있을 때만 커밋
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update RSS feed [skip ci]" && git push)
